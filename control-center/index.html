<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Center - Elator POS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            background: linear-gradient(to left, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button.primary {
            background: var(--primary);
            color: #0f172a;
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        button.danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        button.danger:hover {
            background: var(--danger);
            color: white;
        }

        button.full {
            grid-column: span 2;
            background: #334155;
            color: white;
            margin-top: 0.5rem;
        }

        button.full:hover {
            background: #475569;
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.4);
            font-size: 0.85rem;
            min-height: 40px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .success-text {
            color: var(--success);
        }

        .error-text {
            color: var(--danger);
        }

        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>لوحة التحكم عن بعد 🛰️</h1>

        <div class="input-group">
            <label>رابط العميل (Tunnel URL)</label>
            <input type="text" id="url" placeholder="https://yassen-elator-pos.loca.lt"
                value="https://yassen-elator-pos.loca.lt">
        </div>

        <div class="input-group">
            <label>مفتاح الأمان (Secret Key)</label>
            <input type="password" id="key" placeholder="ادخل مفتاح الأمان" value="yassen-elator-admin-2026">
        </div>

        <div id="status">جاهز للاتصال...</div>

        <div class="actions">
            <button class="primary" onclick="checkStatus()">
                <div class="loader" id="loader-status"></div>
                فحص الحالة
            </button>
            <button class="primary" onclick="downloadBackup()">
                <div class="loader" id="loader-backup"></div>
                سحب قاعدة البيانات
            </button>
            <button class="danger full" onclick="killApp()">
                إغلاق البرنامج عن بعد ⚠️
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        async function api(method, endpoint, params = {}) {
            const url = document.getElementById('url').value.replace(/\/$/, '') + endpoint;
            const key = document.getElementById('key').value;

            try {
                const response = await axios({
                    method,
                    url,
                    headers: { 'x-admin-key': key },
                    data: params
                });
                return response.data;
            } catch (err) {
                throw new Error(err.response?.data?.message || err.message);
            }
        }

        function setMsg(txt, type = '') {
            const el = document.getElementById('status');
            el.innerHTML = txt;
            el.className = type ? type + '-text' : '';
        }

        async function checkStatus() {
            setMsg('جاري الاتصال...');
            try {
                const data = await api('get', '/api/remote/status');
                setMsg(`🟢 البرنامج متصل!<br>إصدار: ${data.version}<br>نظام: ${data.platform}`, 'success');
            } catch (e) {
                setMsg(`🔴 فشل الاتصال: ${e.message}`, 'error');
            }
        }

        async function downloadBackup() {
            const url = document.getElementById('url').value.replace(/\/$/, '') + '/api/remote/backup';
            const key = document.getElementById('key').value;

            setMsg('جاري تجهيز قاعدة البيانات...');

            try {
                // We use fetch for binary download
                const response = await fetch(url, {
                    headers: { 'x-admin-key': key }
                });

                if (!response.ok) throw new Error('فشل التحميل');

                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `backup_${new Date().toISOString().slice(0, 10)}.db`;
                link.click();

                setMsg('✅ تم تحميل قاعدة البيانات بنجاح!', 'success');
            } catch (e) {
                setMsg(`🔴 فشل التحميل: ${e.message}`, 'error');
            }
        }

        async function killApp() {
            if (!confirm('هل أنت متأكد من إغلاق البرنامج عند العميل؟')) return;

            setMsg('جاري إرسال أمر الإغلاق...');
            try {
                await api('post', '/api/remote/kill');
                setMsg('✅ تم إرسال الأمر بنجاح. سيتم إغلاق البرنامج خلال ثوان.', 'success');
            } catch (e) {
                setMsg(`🔴 فشل الأمر: ${e.message}`, 'error');
            }
        }
    </script>
</body>

</html>
